# Render blueprint for the Zillit catering + craft service web client.
#
# Deploy flow:
#   1. Make sure the backend service (zillit-catering-api) is already live
#      and note its URL.
#   2. Commit this file to main and push.
#   3. Render Dashboard → New → Blueprint → pick this repo.
#   4. Render reads this file, builds with Vite, and publishes `dist/`.
#   5. If your backend service is named something other than
#      `zillit-catering-api`, edit the VITE_* default values below (or
#      override them in the dashboard) before the first build.
#
# Notes:
#   - The VITE_* env vars are inlined into the bundle at build time — they
#     are NOT runtime config. To change them you have to redeploy.
#   - The rewrite rule sends all unmatched paths to /index.html so deep
#     links like /catering or /craftservice work when a user pastes the
#     URL directly.
services:
  - type: web
    name: zillit-catering-app
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        value: https://zillit-catering-api.onrender.com/api/v2
      - key: VITE_WS_BASE_URL
        value: https://zillit-catering-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
